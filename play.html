<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Catur | Catur Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="play.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">Catur<span>Master</span></a></div>
            <ul>
                <li><a href="index.html">Kembali ke Home</a></li>
            </ul>
        </nav>
    </header>

    <!-- Modal Pemilihan Mode -->
    <div id="mode-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Pilih Mode Permainan</h2>
            <p>Silakan pilih mode untuk memulai permainan catur Anda.</p>
            <div class="modal-btns">
                <button id="modal-btn-pvp" class="btn-primary">👥 Player vs Player</button>
                <button id="modal-btn-bot" class="btn-secondary">🤖 Player vs Bot</button>
            </div>
        </div>
    </div>

    <main class="play-container">
        <div class="game-layout">
            <div class="controls">
                <h2>Mode Permainan</h2>
                <div id="active-mode-indicator">Mode Aktif: <span id="current-mode">Belum Dipilih</span></div>
                <button id="btn-pvp" class="mode-btn">👥 Player vs Player (Lokal)</button>
                <button id="btn-bot" class="mode-btn">🤖 Player vs Bot</button>
                
                <div class="status-box">
                    <h3>Status:</h3>
                    <p id="status">Silakan pilih mode terlebih dahulu</p>
                </div>
                
                <div class="history-box">
                    <h3>Catatan Langkah (PGN):</h3>
                    <textarea id="pgn" readonly></textarea>
                </div>
            </div>
            
            <div class="board-area">
                <div id="myBoard" style="width: 400px; max-width: 100%;"></div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="play.js"></script>
</body>
</html>
