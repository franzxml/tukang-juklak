<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Mandiri | Catur Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="play.css">
    <link rel="stylesheet" href="practice.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">Catur<span>Master</span></a></div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="tournament.html">Turnamen</a></li>
                <li><a href="play.html">Main Biasa</a></li>
            </ul>
        </nav>
    </header>

    <main class="play-container">
        <div class="practice-header">
            <h1>📚 Latihan Mandiri & Analisis</h1>
            <p>Eksperimen dengan strategi Anda dan dapatkan saran dari AI.</p>
        </div>

        <div class="game-layout">
            <div class="controls">
                <h2>Analisis Posisi</h2>
                
                <div class="eval-section">
                    <h3>Evaluasi AI:</h3>
                    <div class="eval-bar-container">
                        <div id="eval-bar" class="eval-bar"></div>
                    </div>
                    <p id="eval-text">0.0 (Seimbang)</p>
                </div>

                <div class="action-btns">
                    <button id="hint-btn" class="btn-primary">💡 Tanya Langkah Terbaik</button>
                    <button id="undo-btn" class="btn-secondary">↩️ Tarik Langkah (Undo)</button>
                    <button id="reset-btn" class="btn-secondary">🔄 Reset Papan</button>
                </div>

                <div class="status-box">
                    <h3>Status:</h3>
                    <p id="status">Bebas gerakkan bidak manapun</p>
                </div>
                
                <div class="history-box">
                    <h3>Catatan PGN:</h3>
                    <textarea id="pgn" readonly></textarea>
                </div>
            </div>
            
            <div class="board-area">
                <div id="myBoard" style="width: 400px; max-width: 100%;"></div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="practice.js"></script>
</body>
</html>
