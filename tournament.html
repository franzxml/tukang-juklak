<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnamen Bot | Catur Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="play.css">
    <link rel="stylesheet" href="tournament.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">Catur<span>Master</span></a></div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="play.html">Main Biasa</a></li>
            </ul>
        </nav>
    </header>

    <main class="play-container">
        <div class="tournament-header">
            <h1>🏆 Turnamen Melawan Bot</h1>
            <div class="progress-bar">
                <div id="step-1" class="step active">1. Noob</div>
                <div id="step-2" class="step">2. Intermediate</div>
                <div id="step-3" class="step">3. Grandmaster</div>
            </div>
        </div>

        <div class="game-layout">
            <div class="controls">
                <h2 id="bot-name">🤖 Bot Noob</h2>
                <div class="status-box">
                    <h3>Status Turnamen:</h3>
                    <p id="tourney-status">Klik "Mulai Babak" untuk bertanding!</p>
                </div>
                
                <button id="start-round-btn" class="btn-primary">Mulai Babak</button>

                <div class="history-box">
                    <h3>Catatan Langkah:</h3>
                    <textarea id="pgn" readonly></textarea>
                </div>
            </div>
            
            <div class="board-area">
                <div id="myBoard" style="width: 400px; max-width: 100%;"></div>
            </div>
        </div>
    </main>

    <!-- Modal Menang/Kalah -->
    <div id="result-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 id="result-title">Selamat!</h2>
            <p id="result-text">Anda berhasil mengalahkan Bot Noob.</p>
            <div class="modal-btns">
                <button id="next-round-btn" class="btn-primary">Lanjut ke Babak Berikutnya</button>
                <button onclick="location.reload()" class="btn-secondary">Main Lagi</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="tournament.js"></script>
</body>
</html>
